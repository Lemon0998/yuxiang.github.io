<!DOCTYPE html>
<html lang="zh-CN">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", SimSun, sans-serif;
        }
        body {
            background-color: #e6f7e9; /* 淡绿色底色 */
            color: #2d5a32;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;

        }
        .jump-btn {

            text-decoration: none;
            padding: 18px;
            font-size: 20px;
            border-radius: 12px;
            transition: all 0.25s ease;
        }
        .btn-official {
            background-color: #72c880;
            color: #0f3614;
        }
        .btn-official:hover {
            background-color: #5bb96b;
        }
        .btn-web {
            background-color: #b1e4b9;
            color: #1a4d20;
        }
        .btn-web:hover {
            background-color: #99d8a4;
        }
        .tips-text {
            font-size: 16px;
            line-height: 1.8;
            color: #386e3e;
        }
    </style>
</head>
